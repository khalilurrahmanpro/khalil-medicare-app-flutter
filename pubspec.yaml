name: khalil_medicare_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  carousel_slider: ^4.2.1
  pdf: ^3.10.8
  supabase_flutter: ^2.5.0
  printing: ^5.12.0
  path_provider: ^2.1.2
  http: ^1.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  intl: ^0.19.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1 

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/slide1.png
    - assets/images/slide2.png
    - assets/images/slide3.png